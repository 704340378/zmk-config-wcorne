# go to sleep after one hour (1 * 60 * 60 * 1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=n

# 睡眠设置
CONFIG_ZMK_SLEEP=n

# HID 设置
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y
#CONFIG_ZMK_MOUSE=n

# =========================
# ⛔ 显示相关 —— 必须全部显式关闭 (解决编译报错的关键)
# =========================
CONFIG_ZMK_DISPLAY=n
CONFIG_LVGL=n
CONFIG_DISPLAY=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=n
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=0
CONFIG_LV_Z_BITS_PER_PIXEL=0
CONFIG_LV_COLOR_DEPTH_1=n
CONFIG_LV_DPI_DEF=0
CONFIG_LV_Z_VDB_SIZE=0
CONFIG_LV_USE_THEME_MONO=n
CONFIG_LV_COLOR_CHROMA_KEY_HEX=0
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_16=n
CONFIG_LV_FONT_MONTSERRAT_26=n
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=n

# =========================
# 硬件与外设设置
# =========================
# 如果你没有接 Nice!View 屏幕，确保这部分也是关闭的
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

# =========================
# Flash / Settings
# =========================
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

CONFIG_ARM_MPU=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# =========================
# Clock
# =========================
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

# =========================
# Zephyr base
# =========================
CONFIG_PINCTRL=y
CONFIG_GPIO=y
